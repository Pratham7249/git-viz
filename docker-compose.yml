version: '3.8'

services:
  redis-cache:
    image: redis:7-alpine
    container_name: gitviz-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gitviz-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - REDIS_URL=redis://redis-cache:6379
      - GITHUB_PAT=${GITHUB_PAT:-}
    depends_on:
      - redis-cache
    restart: always

  frontend-client:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:5000/api}
    container_name: gitviz-frontend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:5000/api}
    depends_on:
      - backend-api
    restart: always

volumes:
  redis_data:
